<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PPT账本</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  background:#f2f2f7;
  margin:0;
  display:flex;
  justify-content:center;
}

.app{
  width:390px;
  min-height:100vh;
  background:#f2f2f7;
  position:relative;
}

.nav{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:18px;
}

.section{
  padding:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.big-number{
  font-size:32px;
  font-weight:700;
  margin-top:4px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  font-size:13px;
}

.day{
  padding:8px 0;
  text-align:center;
  border-radius:8px;
  background:#f4f4f8;
  color:#555;
}

.day.order{
  background:#d1f5d3;
  color:#135c1d;
  font-weight:600;
}

.order{
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.order:last-child{
  border:none;
}

.tabbar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:390px;
  height:70px;
  background:white;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:12px;
}

.fab{
  position:fixed;
  bottom:90px;
  right:calc(50% - 195px + 20px);
  width:56px;
  height:56px;
  background:#007aff;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
  cursor:pointer;
}

.sheet-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  opacity:0;
  pointer-events:none;
  transition:0.25s;
}

.sheet-mask.show{
  opacity:1;
  pointer-events:auto;
}

.sheet{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:-500px;
  width:390px;
  max-width:100%;
  background:white;
  border-radius:20px 20px 0 0;
  padding:20px;
  transition:bottom 0.3s;
}

.sheet.show{
  bottom:0;
}

.handle{
  width:40px;
  height:4px;
  background:#ccc;
  border-radius:2px;
  margin:auto;
  margin-bottom:16px;
}

.sheet h3{
  margin:0 0 12px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

input:focus{
  outline:none;
  border-color:#007aff;
  box-shadow:0 0 0 2px rgba(0,122,255,0.15);
}

button{
  background:#007aff;
  color:white;
  border:none;
  padding:11px;
  border-radius:12px;
  width:100%;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

@media (max-width:420px){
  .app,.tabbar,.sheet{
    width:100%;
  }
  .fab{
    right:20px;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="nav">
    PPT账本
  </div>

  <div class="section">

    <div class="card">
      <div>本月收入</div>
      <div class="big-number" id="income">¥0</div>
    </div>

    <div class="card">
      <div>最近订单</div>
      <div id="orders"></div>
    </div>

    <div class="card">
      <div>本月日历</div>
      <div class="calendar" id="calendar"></div>
    </div>

  </div>

</div>

<div class="fab" onclick="openSheet()">+</div>

<div class="tabbar">
  <div>🏠<br>首页</div>
  <div>📅<br>订单</div>
  <div>📊<br>统计</div>
  <div>⚙️<br>设置</div>
</div>

<div class="sheet-mask" id="mask" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h3>新增订单</h3>

  <input placeholder="客户" id="client">
  <input placeholder="项目名称" id="title">
  <input type="date" id="date">
  <input placeholder="页数" id="pages" type="number" min="1">
  <input placeholder="单价（元/页）" id="price" type="number" min="0" step="0.01">

  <button onclick="save()">保存</button>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("pptOrders") || "[]");

const incomeEl = document.getElementById("income");
const ordersEl = document.getElementById("orders");
const calendarEl = document.getElementById("calendar");
const sheetEl = document.getElementById("sheet");
const maskEl = document.getElementById("mask");

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth(); // 0-11

function formatMoney(num){
  const n = Number(num) || 0;
  return n.toLocaleString("zh-CN",{minimumFractionDigits:0,maximumFractionDigits:2});
}

function render(){
  let income = 0;
  let list = "";

  const sorted = orders.slice().sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  sorted.slice(0,5).forEach(o=>{
    income += o.total || 0;

    const d = o.date ? new Date(o.date) : null;
    const dateStr = d ? `${d.getMonth()+1}/${d.getDate()}` : "未填日期";

    list += `
      <div class="order">
        <b>${o.title || "未命名项目"}</b><br>
        ${o.client || "未填客户"} · ${o.pages || 0}页 · ${dateStr}<br>
        ¥${formatMoney(o.total)}
      </div>
    `;
  });

  incomeEl.innerText = "¥" + formatMoney(income);
  ordersEl.innerHTML = list || '<div style="color:#999;padding-top:6px;">暂无订单，点右下角 + 新建一笔。</div>';

  renderCalendar();
}

function renderCalendar(){
  calendarEl.innerHTML = "";

  const firstDay = new Date(currentYear, currentMonth, 1);
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  let startWeek = firstDay.getDay(); // 0-6, 周日为0

  const blanks = (startWeek + 6) % 7; // 让周一在第一列
  for(let i=0;i<blanks;i++){
    const d = document.createElement("div");
    d.className = "day";
    d.innerHTML = "";
    d.style.background="transparent";
    calendarEl.appendChild(d);
  }

  for(let day=1; day<=daysInMonth; day++){
    const cell = document.createElement("div");
    cell.className = "day";
    cell.innerText = day;

    const hasOrder = orders.some(o=>{
      if(!o.date) return false;
      const d = new Date(o.date);
      return d.getFullYear() === currentYear &&
             d.getMonth() === currentMonth &&
             d.getDate() === day;
    });

    if(hasOrder){
      cell.classList.add("order");
    }

    calendarEl.appendChild(cell);
  }
}

function openSheet(){
  sheetEl.classList.add("show");
  maskEl.classList.add("show");
}

function closeSheet(){
  sheetEl.classList.remove("show");
  maskEl.classList.remove("show");
}

function save(){
  const client = document.getElementById("client").value.trim();
  const title = document.getElementById("title").value.trim();
  const date = document.getElementById("date").value;
  const pages = Number(document.getElementById("pages").value) || 0;
  const price = Number(document.getElementById("price").value) || 0;

  if(!title || !date || !pages || !price){
    alert("请把项目名称、日期、页数、单价都填完整。");
    return;
  }

  const o = { client, title, date, pages, price };
  o.total = pages * price;

  orders.push(o);
  localStorage.setItem("pptOrders", JSON.stringify(orders));

  document.getElementById("client").value = "";
  document.getElementById("title").value = "";
  document.getElementById("date").value = "";
  document.getElementById("pages").value = "";
  document.getElementById("price").value = "";

  closeSheet();
  render();
}

render();
</script>

</body>
</html>
